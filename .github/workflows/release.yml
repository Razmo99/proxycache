name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          !startsWith(github.event.workflow_run.head_commit.message || '', 'chore(release):')
        )
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN != '' && secrets.SEMANTIC_RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Force branch to workflow SHA
        run: git reset --hard ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Semantic release
        id: release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.SEMANTIC_RELEASE_TOKEN != '' && secrets.SEMANTIC_RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          git_committer_name: github-actions[bot]
          git_committer_email: 41898282+github-actions[bot]@users.noreply.github.com
          changelog: "true"
          commit: "true"
          vcs_release: "true"
          build: "false"
